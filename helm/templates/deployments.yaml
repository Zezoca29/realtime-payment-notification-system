# ── payment-producer Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-producer
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "payment-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: payment-producer
spec:
  replicas: {{ .Values.paymentProducer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-producer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-producer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "{{ .Values.paymentProducer.port }}"
    spec:
      containers:
        - name: payment-producer
          image: {{ include "payment-system.image" (dict "global" .Values.global "image" .Values.paymentProducer.image) }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.paymentProducer.port }}
          envFrom:
            - configMapRef:
                name: payment-system-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: POSTGRES_PASSWORD
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: INTERNAL_API_KEY
          resources:
            {{- toYaml .Values.paymentProducer.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.paymentProducer.port }}
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.paymentProducer.port }}
            initialDelaySeconds: 30
            periodSeconds: 5
---
