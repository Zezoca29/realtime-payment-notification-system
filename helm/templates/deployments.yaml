# ── websocket-gateway Deployment ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "payment-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: websocket-gateway
spec:
  replicas: {{ .Values.websocketGateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: websocket-gateway
    spec:
      containers:
        - name: websocket-gateway
          image: {{ include "payment-system.image" (dict "global" .Values.global "image" .Values.websocketGateway.image) }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.websocketGateway.port }}
          env:
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
            - name: SECURITY_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: INTERNAL_API_KEY
          resources:
            {{- toYaml .Values.websocketGateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.websocketGateway.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
---
# ── frontend Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "payment-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "payment-system.image" (dict "global" .Values.global "image" .Values.frontend.image) }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
